<div class="kpi-card">
    <div class="kpi-icon {{iconClass}}">
        {{> icon name=iconName}}
    </div>
    <div class="kpi-label"><span data-i18n="{{labelKey}}">{{label}}</span></div>
    <div class="kpi-value">{{value}} <span>{{unit}}</span></div>
    <div class="kpi-delta {{deltaClass}}" data-i18n="{{deltaKey}}">{{delta}}</div>
</div>
