<a class="acard" href="{{href}}">
    <div class="acard-num" data-i18n="{{numKey}}">{{num}}</div>
    <div class="acard-title" data-i18n="{{titleKey}}">{{title}}</div>
    <div class="acard-metrics">
        {{> @partial-block }}
    </div>
    <div class="acard-footer"><span class="acard-link"><span data-i18n="page.open_link">Open</span> {{> icon name="chevron-right" strokeWidth="2.5"}}</span></div>
</a>
