<header class="topbar">
    <button class="menu-toggle" id="sidebar-toggle">
        {{> icon name="menu-bars" width="24" height="24"}}
    </button>
    
    <div class="topbar-right">
        <div class="search-wrap">
            {{> icon name="search" class="search-icon"}}
            <input type="text" placeholder="Search..." data-i18n="head.search">
        </div>
        <div class="lang-switcher">
            <a class="lang-btn" href="#" data-lang="ru">RU</a>
            <a class="lang-btn" href="#" data-lang="en">EN</a>
            <a class="lang-btn" href="#" data-lang="lt">LT</a>
        </div>
        <button class="notif-btn">
            {{> icon name="bell-notification"}}
            <span class="badge-dot"></span>
        </button>
        <div class="user-profile">
            <div class="user-avatar">MV</div>
            <div class="user-info">
                <span class="user-name" data-i18n="head.user">Maxim V.</span>
                <span class="user-role" data-i18n="head.role">Director</span>
            </div>
        </div>
    </div>
</header>
