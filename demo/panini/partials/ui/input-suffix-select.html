<div class="input-with-suffix custom-select-wrap" id="{{selectId}}">
    <input type="number" class="glass-input dirty-check" id="{{inputId}}" placeholder="{{placeholder}}">
    <div class="input-suffix custom-select-trigger">
        <span class="curr-val">{{defaultValue}}</span>
    </div>
    <div class="custom-select-list">
        {{> @partial-block}}
    </div>
    <input type="hidden" class="dirty-check" id="{{fieldId}}" value="{{defaultValue}}">
</div>
