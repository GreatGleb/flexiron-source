<div class="custom-select-wrap" id="{{id}}">
    <div class="glass-input custom-select-trigger">
        <div class="curr-val"{{#if triggerStyle}} style="{{triggerStyle}}"{{/if}}>{{{triggerContent}}}</div>
        {{> icon name="chevron-down" width="12" height="12" class="select-arrow"}}
    </div>
    <div class="custom-select-list">
        {{> @partial-block }}
    </div>
    <input type="hidden" class="dirty-check" id="{{fieldId}}" value="{{defaultValue}}">
</div>
