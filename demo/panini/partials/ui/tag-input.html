<div class="tag-container{{#if hasDropdown}} custom-select-wrap{{/if}}" id="{{id}}">
    {{> @partial-block }}
    <input type="text" class="tag-input" data-i18n="{{placeholderKey}}"{{#if readonly}} readonly{{/if}}>
    {{#if dropdownId}}
    <div class="tag-dropdown" id="{{dropdownId}}">{{{dropdownContent}}}</div>
    {{/if}}
</div>
