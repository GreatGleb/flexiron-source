<input type="file" id="{{inputId}}" style="display: none;" multiple>
<div class="dropzone" onclick="document.getElementById('{{inputId}}').click()">
    {{> icon name="upload-arrow" width="28" height="28" strokeColor="#a0a5b1" style="margin-bottom:4px"}}
    <div class="dropzone-text" data-i18n="{{hintKey}}">{{hint}}</div>
</div>
