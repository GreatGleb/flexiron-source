<div class="custom-datepicker-wrap" id="{{id}}">
    <div class="glass-input datepicker-trigger">
        <span class="date-val">{{displayDate}}</span>
        {{> icon name="calendar" width="14" height="14" style="opacity:0.5"}}
    </div>
    <input type="hidden" class="datepicker-input dirty-check" id="{{fieldId}}" value="{{value}}">
    <div class="datepicker-popup"></div>
</div>
