<div class="glass-panel{{#if loading}} loading{{/if}}{{#if panelClass}} {{panelClass}}{{/if}}">
    <div class="panel-header">
        <span class="panel-title" data-i18n="{{titleKey}}">{{title}}</span>
        {{#if badge}}<span class="panel-badge" data-i18n="{{badgeKey}}">{{badge}}</span>{{/if}}
        {{#if actionLabel}}<button class="nav-btn" id="{{actionId}}" style="width:auto; padding:0 10px; font-size:10px; height:22px; gap:5px; opacity:0.8; background:rgba(24, 144, 255, 0.1); border-color:rgba(24, 144, 255, 0.2);">{{> icon name="plus-add" width="10" height="10" strokeWidth="3" strokeColor="#1890FF"}}<span data-i18n="{{actionKey}}">{{actionLabel}}</span></button>{{/if}}
    </div>
    {{#if skeletonWidth}}<div class="panel-skeleton"><div class="skeleton" style="width:{{skeletonWidth}}"></div><div class="skeleton" style="height:{{skeletonHeight}}"></div></div>{{/if}}
    {{#if hasBody}}<div class="panel-body">{{/if}}
    {{> @partial-block }}
    {{#if hasBody}}</div>{{/if}}
</div>
