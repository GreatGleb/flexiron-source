<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexiron</title>
  <script>
    (function () {
      var demoBase = '/Flexiron-Enterprise/demo/';
      var l = window.location;
      if (l.pathname.indexOf(demoBase) === 0) {
        sessionStorage.redirect = l.pathname + l.search + l.hash;
        l.replace(demoBase);
      }
    })();
  </script>
</head>
<body></body>
</html>
