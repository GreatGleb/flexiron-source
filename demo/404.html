<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexiron - Metal Center Management Ecosystem</title>
  <meta name="description" content="Flexiron">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (function () {
      var basePath = '/Flexiron-Enterprise/demo/';
      var loc = window.location;
      var path = loc.pathname.indexOf(basePath) === 0
        ? loc.pathname.slice(basePath.length - 1)
        : loc.pathname;
      sessionStorage.redirect = path + loc.search + loc.hash;
      loc.replace(basePath);
    })();
  </script>
</head>
<body></body>
</html>
