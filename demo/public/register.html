<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="reg.seo.title">Registration - Flexiron</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/erp-base.css">
    <link href="../assets/css/erp-base.css" rel="stylesheet">
    <link href="../assets/css/public/public.css" rel="stylesheet">
    <link href="../assets/css/public/register.css" rel="stylesheet">
    
    <meta name="description" content="Flexiron" data-i18n="reg.seo.description">
    <link rel="icon" type="image/svg+xml" href="../assets/images/Flexiron_Icon_Blue.svg">
</head>
<body>
    <div class="lang-switcher">
        <a href="#" class="lang-btn">RU</a>
        <a href="#" class="lang-btn">EN</a>
        <a href="#" class="lang-btn">LT</a>
    </div>
    <a href="index.html" class="top-back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        <span data-i18n="common.back">Back</span>
    </a>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="container">
        <div class="hero-card">
            <div class="logo-container">
                <img src="../assets/images/Flexiron_Logo_White.svg" alt="Flexiron Logo" class="logo-icon">
            </div>
            <h1 data-i18n="reg.title">Create an Account</h1>
            <div class="trial-banner">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span data-i18n="reg.trial">14-day basic trial will be available to you</span>
            </div>
            <form class="form-grid" action="index.html" method="get">
                <h2 class="form-section-title" data-i18n="reg.contactsTitle">Contact Information</h2>
                <div class="form-group col-span-2">
                    <label class="form-label" data-i18n="reg.nameLabel">Full Name (Director)</label>
                    <input type="text" class="form-input" placeholder="John Doe" data-i18n="reg.namePlaceholder" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.emailLabel">E-mail</label>
                    <input type="email" class="form-input" placeholder="" data-i18n="common.emailPlaceholder" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.phoneLabel">Phone</label>
                    <input type="tel" class="form-input" placeholder="" data-i18n="common.phonePlaceholder" required>
                </div>
                <div class="form-group col-span-2">
                    <label class="form-label" data-i18n="reg.pwdLabel">Create a strong password</label>
                    <div class="input-icon-wrapper">
                        <input type="password" class="form-input" placeholder="" data-i18n="common.pwdPlaceholder" required>
                        <div class="input-action-icon" data-i18n-title="reg.showPassword" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                    </div>
                </div>
                <h2 class="form-section-title" style="margin-top: 0.5rem;" data-i18n="reg.companyTitle">Company Details</h2>
                <div class="form-group col-span-2">
                    <label class="form-label" data-i18n="reg.companyLabel">Company Name</label>
                    <input type="text" class="form-input" placeholder="MetalCorp LLC" data-i18n="reg.companyPlaceholder" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.vatLabel">Company Code / VAT</label>
                    <input type="text" class="form-input" placeholder="e.g., 12345678" data-i18n="reg.vatPlaceholder" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.countryLabel">Country / City</label>
                    <input type="text" class="form-input" placeholder="Lithuania, Vilnius" data-i18n="reg.countryPlaceholder" required>
                </div>
                <div class="col-span-2">
                    <button type="submit" class="cta-button" data-i18n="reg.btnSubmit">Create Company and Start</button>
                    <p class="terms-note">
                        <span data-i18n="reg.terms">By clicking, you agree to our</span> 
                        <a href="terms.html" target="_blank" data-i18n="reg.termsLink">Terms and Conditions of Use</a>.
                    </p>
                </div>
            </form>
        </div>
    </div>
    <!-- i18n Engine -->
    <script src="../assets/js/lang/public_translations.js"></script>
    <script src="../assets/js/lang/engine.js"></script>
</body>
</html>
