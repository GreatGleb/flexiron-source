<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="error.seo.title">Page Not Found - Flexiron</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../assets/css/erp-base.css" rel="stylesheet">
    <link href="../assets/css/public/public.css" rel="stylesheet">
    <link href="../assets/css/public/404.css" rel="stylesheet">

    <meta name="description" content="Flexiron" data-i18n="error.seo.description">
    <link rel="icon" type="image/svg+xml" href="../assets/images/Flexiron_Icon_Blue.svg">
</head>
<body>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <a href="#" class="lang-btn" data-lang="ru">RU</a>
        <a href="#" class="lang-btn" data-lang="en">EN</a>
        <a href="#" class="lang-btn" data-lang="lt">LT</a>
    </div>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="hero-card">
            <div class="logo-container">
                <img src="../assets/images/Flexiron_Logo_White.svg" alt="Flexiron Logo" class="logo-icon">
            </div>
            
            <div class="error-code">404</div>
            <h1 data-i18n="error.title">It seems you're lost in the warehouse</h1>
            
            <p class="subtitle">
                <span data-i18n="error.subtitle">The page may have been deleted, moved, or you entered the wrong address.</span>
            </p>

            <a href="index.html" class="cta-button">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span data-i18n="error.btnHome">Back to Home</span>
            </a>
        </div>
    </div>

    <!-- i18n Engine -->
    <script src="../assets/js/lang/public_translations.js"></script>
    <script src="../assets/js/lang/engine.js"></script>
</body>
</html>
