<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login.seo.title">Login - Flexiron</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../assets/css/erp-base.css" rel="stylesheet">
    <link href="../assets/css/public/public.css" rel="stylesheet">
    <link href="../assets/css/public/login.css" rel="stylesheet">

    <meta name="description" content="Flexiron" data-i18n="login.seo.description">
    <link rel="icon" type="image/svg+xml" href="../assets/images/Flexiron_Icon_Blue.svg">
</head>
<body>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <a href="#" class="lang-btn" data-lang="ru">RU</a>
        <a href="#" class="lang-btn" data-lang="en">EN</a>
        <a href="#" class="lang-btn" data-lang="lt">LT</a>
    </div>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <div class="hero-card">
            <div class="logo-container">
                <img src="../assets/images/Flexiron_Logo_White.svg" alt="Flexiron Logo" class="logo-icon">
            </div>
            
            <h1 data-i18n="login.title">Login to Workspace</h1>
            
            <p class="subtitle">
                <span data-i18n="login.subtitle">Secure link verified. Please enter your password to login.</span>
            </p>

            <form class="auth-form" action="index.html" method="get">
                
                <div class="form-group">
                    <label class="form-label" data-i18n="login.emailLabel">E-mail (Linked to your invite)</label>
                    <input type="email" class="form-input" value="director@metalltorg.com" disabled>
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="login.pwdLabel">Password</label>
                    <div class="input-icon-wrapper">
                        <input type="password" class="form-input" placeholder="••••••••" data-i18n="common.pwdPlaceholder" required autofocus>
                        <div class="input-action-icon" title="Show password" data-i18n-title="reg.showPassword">
                            <!-- Eye icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" class="custom-checkbox" checked>
                        <span data-i18n="login.remember">Remember me</span>
                    </label>
                    
                    <a href="support.html" class="forgot-link" data-i18n="login.forgot">Forgot password?</a>
                </div>

                <button type="submit" class="cta-button" data-i18n="login.btnSubmit">Log In</button>
            </form>
        </div>
    </div>

    <!-- i18n Engine -->
    <script src="../assets/js/lang/public_translations.js"></script>
    <script src="../assets/js/lang/engine.js"></script>
</body>
</html>
